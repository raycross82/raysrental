[build]
  command = "rm -rf out && mkdir out && unzip -o raysrental-deploy.zip -d out"
  publish = "out"

# --- Redirects: old .html URLs and JS-era slugs -> new clean URLs ---
[[redirects]]
  from = "/Home.html"
  to = "/"
  status = 301
  force = true

